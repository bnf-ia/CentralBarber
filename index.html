<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgendaBarber</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B3A2F;--ink2:#102219;--paper:#F2E9D6;--card:#FFFBF1;
  --brass:#BD9152;--brass-d:#8C6730;--red:#9C3B2E;--green:#2D6A4F;
  --text:#2B2620;--muted:#6E6354;--line:#E2D6BC;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--text);font-family:'Work Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
#app{min-height:100vh;}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 20px;border-radius:10px;border:none;font-family:'Work Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:.15s ease;gap:6px;white-space:nowrap;}
.btn-block{display:flex;width:100%;}
.btn-p{background:var(--brass);color:#fff;}
.btn-p:hover{background:var(--brass-d);}
.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.btn-g{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-g:hover{border-color:var(--brass);}
.btn-r{background:transparent;color:var(--red);border:1.5px solid var(--red);}
.btn-r:hover{background:var(--red);color:#fff;}
.btn-sm{padding:8px 13px;font-size:13px;}

input[type=text],input[type=email],input[type=password],input[type=tel],
input[type=number],input[type=date],input[type=time],select{
  width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--line);
  background:var(--card);font-size:15px;font-family:'Work Sans',sans-serif;color:var(--text);
}
input:focus,select:focus{outline:2px solid var(--brass);border-color:var(--brass);}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.fld{margin-bottom:14px;}
.ferr{color:var(--red);font-size:12.5px;margin-top:5px;}
.fhint{font-size:12.5px;color:var(--muted);margin-top:5px;}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:18px;}

.loadscreen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;color:var(--muted);}
.mini-load{display:flex;align-items:center;justify-content:center;padding:28px;color:var(--muted);}
.spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;animation:tIn .25s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* LANDING */
.lp-wrap{min-height:100vh;background:radial-gradient(140% 160% at 50% -10%,var(--ink) 0%,var(--ink2) 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 48px;text-align:center;}
.lp-scissors{width:52px;height:52px;margin:0 auto 14px;color:var(--brass);}
.lp-title{font-family:'Anton',sans-serif;font-size:44px;color:#FBF4E3;letter-spacing:.5px;line-height:1;}
.lp-tagline{font-size:14px;color:#A9C4B0;margin-top:8px;letter-spacing:.3px;}
.lp-search{width:100%;max-width:400px;margin:36px auto 0;text-align:left;position:relative;}
.lp-search-label{color:#D9CFB8;font-size:13px;font-weight:600;letter-spacing:.3px;display:block;margin-bottom:8px;}
.lp-input-wrap{display:flex;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.35);}
.lp-name-input{flex:1;background:rgba(255,255,255,.10);border:none;color:#fff;font-size:15px;padding:15px 16px;font-family:'Work Sans',sans-serif;outline:none;min-width:0;}
.lp-name-input::placeholder{color:rgba(255,255,255,.32);}
.lp-name-input:focus{background:rgba(255,255,255,.15);}
.lp-results{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:#1E3D2F;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:10;}
.lp-result-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.06);}
.lp-result-item:last-child{border-bottom:none;}
.lp-result-item:hover{background:rgba(255,255,255,.08);}
.lp-result-name{font-weight:600;font-size:15px;color:#FBF4E3;}
.lp-result-arrow{color:var(--brass);font-size:16px;}
.lp-result-empty{padding:16px;text-align:center;color:#7FA98C;font-size:14px;}
.lp-searching{padding:14px 16px;text-align:center;color:#7FA98C;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.lp-divider{width:100%;max-width:400px;margin:36px auto 0;display:flex;align-items:center;gap:12px;}
.lp-divider::before,.lp-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.09);}
.lp-divider span{color:rgba(255,255,255,.25);font-size:12px;}
.lp-barber-btn{margin-top:16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:#C4D8C9;border-radius:10px;padding:13px 24px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;}
.lp-barber-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#fff;}
.lp-footer{margin-top:44px;font-size:12px;color:rgba(255,255,255,.18);}

/* AUTH */
.auth-wrap{min-height:100vh;background:radial-gradient(140% 160% at 50% -10%,var(--ink) 0%,var(--ink2) 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:28px 28px 24px;}
.auth-brand{text-align:center;margin-bottom:20px;}
.auth-brand h1{font-family:'Anton',sans-serif;font-size:24px;color:var(--ink);}
.auth-brand em{color:var(--brass);font-style:normal;}
.auth-brand p{font-size:13px;color:var(--muted);margin-top:4px;}
.auth-tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;font-weight:600;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.auth-tab.on{color:var(--brass-d);border-bottom-color:var(--brass);}
.auth-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.auth-row .fld{margin-bottom:0;}
.auth-confirm{background:#EDF7F0;border:1.5px solid #A8D5B5;border-radius:12px;padding:18px;text-align:center;}
.auth-confirm h3{font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px;}
.auth-confirm p{font-size:13.5px;color:#4A7A5A;line-height:1.5;}

/* SETUP */
.setup-wrap{max-width:560px;margin:0 auto;padding:28px 18px 56px;}
.setup-head{text-align:center;margin-bottom:28px;}
.setup-head h1{font-family:'Anton',sans-serif;font-size:28px;color:var(--ink);}
.setup-head p{color:var(--muted);margin-top:6px;font-size:14.5px;}
.sec-title{font-family:'Anton',sans-serif;font-size:18px;color:var(--ink);margin:24px 0 12px;font-weight:400;}
.svc-edit-header{display:grid;grid-template-columns:1fr 72px 80px auto;gap:8px;padding:0 12px;margin-bottom:4px;}
.svc-edit-header span{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.svc-edit{display:grid;grid-template-columns:1fr 72px 80px auto;gap:8px;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.svc-edit input{padding:8px 10px;font-size:14px;}
.rm-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px 6px;}
.rm-btn:hover{color:var(--red);}
.add-svc{background:none;border:1.5px dashed var(--line);border-radius:10px;padding:11px;width:100%;font-size:14px;color:var(--muted);cursor:pointer;margin-top:4px;}
.add-svc:hover{border-color:var(--brass);color:var(--brass-d);}
.day-btn{padding:6px 11px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;transition:.15s;}
.day-btn.closed{background:var(--red);color:#fff;border-color:var(--red);}

/* ADMIN */
.admin-wrap{display:flex;flex-direction:column;min-height:100vh;}
.admin-hdr{background:var(--ink);color:var(--paper);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.admin-logo{font-family:'Anton',sans-serif;font-size:17px;color:#FBF4E3;}
.admin-logo em{color:var(--brass);font-style:normal;}
.shop-tag{font-size:12px;color:var(--brass);font-weight:600;margin-left:8px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.icon-btn{background:rgba(255,255,255,.1);border:none;color:var(--paper);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:rgba(255,255,255,.2);}
.admin-nav{background:var(--card);border-bottom:1.5px solid var(--line);display:flex;padding:0 12px;overflow-x:auto;}
.admin-nav::-webkit-scrollbar{display:none;}
.nav-tab{padding:13px 14px;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:.15s;white-space:nowrap;}
.nav-tab.on{color:var(--brass-d);border-bottom-color:var(--brass);}
.admin-body{flex:1;padding:20px 18px 56px;max-width:680px;margin:0 auto;width:100%;}

.date-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.date-row input{flex:1;}
.dn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dn:hover{border-color:var(--brass);}
.appt-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.appt-info{font-size:13.5px;line-height:1.6;min-width:0;}
.appt-time{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--brass-d);font-size:14px;}
.empty{text-align:center;padding:28px 14px;color:var(--muted);font-size:14px;background:var(--card);border:1.5px dashed var(--line);border-radius:var(--r);line-height:1.6;}
.svc-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.svc-price{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--brass-d);font-size:14px;}
.link-box{background:var(--ink);color:var(--paper);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;word-break:break-all;margin:10px 0;}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* SCHEDULE */
.sched-card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:14px;margin-bottom:8px;transition:.2s;}
.sched-card.closed-day{opacity:.55;}
.sched-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
.sched-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;}
.sched-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--brass);cursor:pointer;flex-shrink:0;}
.sched-toggle span{font-weight:600;font-size:14.5px;color:var(--ink);}
.sched-badge{font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:6px;}
.sched-badge.open-badge{background:#D1EBD9;color:var(--green);}
.sched-badge.closed-badge{background:#F5E0DD;color:var(--red);}
.sched-times{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sched-times .fld{margin:0;}
.sched-times input{padding:10px 12px;font-size:13.5px;}
.sched-times label{font-size:12px;}

/* BLOCKED */
.block-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--card);border:1.5px solid #F5E0DD;border-radius:10px;padding:11px 14px;margin-bottom:8px;}
.block-info{font-size:13.5px;line-height:1.5;}
.block-date{font-weight:700;color:var(--ink);}
.block-time{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--red);font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(16,34,25,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border-radius:18px;padding:24px;width:100%;max-width:400px;}
.modal-box h3{font-family:'Anton',sans-serif;font-size:20px;font-weight:400;color:var(--ink);margin-bottom:14px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}

/* BOOKING */
.bwrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.stripe{height:8px;background:repeating-linear-gradient(115deg,var(--red) 0 14px,var(--paper) 14px 22px,var(--ink) 22px 36px,var(--paper) 36px 44px);}
.bhero{background:radial-gradient(120% 140% at 50% -10%,var(--ink) 0%,var(--ink2) 70%);color:var(--paper);}
.bhero-inner{padding:28px 24px 24px;text-align:center;}
.b-scissors{width:40px;height:40px;margin:0 auto 8px;color:var(--brass);}
.bshop{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:1px;margin:0;color:#FBF4E3;line-height:1;}
.bshop-s{margin:4px 0 0;letter-spacing:5px;font-size:11px;color:var(--brass);font-weight:600;}
.steps-bar{display:flex;justify-content:center;gap:4px;padding:14px 16px 4px;}
.sdot-wrap{display:flex;align-items:center;flex:1;max-width:54px;}
.sdot{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);background:var(--card);flex-shrink:0;transition:.25s;}
.sdot.on{border-color:var(--brass);background:var(--brass);color:#fff;}
.sdot.done{border-color:var(--brass);background:var(--card);color:var(--brass-d);}
.sline{flex:1;height:2px;background:var(--line);margin:0 3px;}
.sline.done{background:var(--brass);}
.bmain{flex:1;padding:8px 18px 36px;}
.bstep{display:none;animation:fs .3s ease;}
.bstep.on{display:block;}
@keyframes fs{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@media(prefers-reduced-motion:reduce){.bstep{animation:none;}}
.btitle{font-family:'Anton',sans-serif;font-weight:400;font-size:22px;letter-spacing:.5px;margin:14px 0 4px;color:var(--ink);}
.bhint{margin:0 0 16px;color:var(--muted);font-size:14px;}
.bback{background:none;border:none;color:var(--muted);font-size:13.5px;cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;gap:4px;}
.bback:hover{color:var(--ink);}
.svc-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.18s ease;text-align:left;width:100%;margin-bottom:10px;}
.svc-card:hover{border-color:var(--brass);transform:translateY(-1px);box-shadow:0 4px 14px rgba(27,58,47,.08);}
.scname{font-weight:600;font-size:15.5px;color:var(--ink);margin:0 0 3px;}
.scmeta{font-size:12.5px;color:var(--muted);}
.scprice{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--brass-d);font-size:15px;}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.slot-btn{padding:11px 4px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;transition:.15s;}
.slot-btn:hover{border-color:var(--brass);}
.sum-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:18px;}
.sum-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.sum-row:last-child{border-bottom:none;}
.sum-row span:first-child{color:var(--muted);}
.sum-row span:last-child{font-weight:600;color:var(--ink);text-align:right;}
.ticket{display:flex;background:var(--card);border-radius:16px;overflow:visible;box-shadow:0 10px 30px rgba(27,58,47,.14);margin-top:8px;}
.ticket-m{flex:1;padding:20px;min-width:0;}
.ticket-m h3{font-family:'Anton',sans-serif;font-weight:400;font-size:19px;color:var(--ink);margin:0 0 12px;}
.ticket-s{width:86px;flex-shrink:0;background:var(--ink);color:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-radius:0 16px 16px 0;}
.ticket-s::before,.ticket-s::after{content:"";position:absolute;left:-9px;width:18px;height:18px;border-radius:50%;background:var(--paper);}
.ticket-s::before{top:-9px;}
.ticket-s::after{bottom:-9px;}
.tnl{font-size:9px;letter-spacing:1.5px;color:var(--brass);margin-bottom:4px;}
.tnum{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;text-align:center;line-height:1.35;padding:0 6px;}
.tsuccess{display:flex;align-items:center;gap:6px;color:var(--green);font-weight:700;font-size:13.5px;margin-bottom:4px;}
</style>
</head>
<body>
<div id="app"><div class="loadscreen"><div class="spinner"></div></div></div>
<script>
const SUPABASE_URL  = 'https://gxhjceiuvvsumkedyyjl.supabase.co';
const SUPABASE_ANON = 'sb_publishable_pi84w4wcglGi7os9aS2lIw_6AL03frM';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

const S = {
  session:null, shop:null, svcs:[], schedules:[], blocked:[],
  tab:'agenda', aDate:today(),
  bShop:null, bSvcs:[], bScheds:[],
  sel:emptysel(),
};

function emptysel(){ return {svcId:null,svc:null,date:null,time:null,name:'',phone:''}; }
function today(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function fromMin(m){ return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
function fPrice(p){ return 'R$ '+Number(p).toFixed(2).replace('.',','); }
function fDate(ds){ const d=new Date(ds+'T00:00:00'); return `${d.toLocaleDateString('pt-BR')} (${'dom,seg,ter,qua,qui,sex,sáb'.split(',')[d.getDay()]})`; }
function slugify(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function $i(id){ return document.getElementById(id); }

function toast(msg,ms=2600){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),ms);
}

/* ---- RECUPERAÇÃO DE SENHA ---- */
function showForgotPassword(){
  document.getElementById('app').innerHTML=`
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-brand"><h1>Agenda<em>Barber</em></h1><p>Redefinir senha</p></div>
        <div class="fld"><label>E-mail da sua conta</label><input id="reset-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
        <p id="reset-msg" style="font-size:13.5px;min-height:18px;margin-bottom:10px;"></p>
        <button class="btn btn-p btn-block" id="reset-btn" onclick="doResetPassword()">Enviar link de redefinição</button>
      </div>
      <div style="margin-top:14px;text-align:center;">
        <button style="background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;" onclick="showAuth('login')">← Voltar para o login</button>
      </div>
    </div>`;
  $i('reset-email').onkeydown=e=>{ if(e.key==='Enter') doResetPassword(); };
}

async function doResetPassword(){
  const email=($i('reset-email').value||'').trim();
  const msg=$i('reset-msg'), btn=$i('reset-btn');
  msg.style.color='var(--red)'; msg.textContent='';
  if(!email){ msg.textContent='Digite o e-mail.'; return; }

/* ---- ROUTER ---- */
async function init(){
  const slug=new URLSearchParams(location.search).get('shop');
  try{
    const race=await Promise.race([
      db.auth.getSession(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
    ]);
    S.session=race.data?.session||null;
    if(slug) return loadBooking(slug);
    if(S.session){ await loadOwner(); return S.shop?showAdmin():showSetup(); }
  }catch(e){
    // Sem rede (file://) ou timeout — mostra UI mesmo assim
    if(slug) return loadBooking(slug);
  }
  showLanding();
}
db.auth.onAuthStateChange(async(ev,session)=>{
  if(new URLSearchParams(location.search).get('shop')) return;
  S.session=session;
  if(ev==='PASSWORD_RECOVERY'){ showNewPassword(); return; }
  if(ev==='SIGNED_IN'){ await loadOwner(); S.shop?showAdmin():showSetup(); }
  else if(ev==='SIGNED_OUT'){ S.shop=null;S.svcs=[];showLanding(); }
});
async function loadOwner(){
  if(!S.session) return;
  const {data}=await db.from('shops').select('*').eq('user_id',S.session.user.id).maybeSingle();
  S.shop=data;
  if(S.shop){
    const [{data:sv}]=await Promise.all([
      db.from('services').select('*').eq('shop_id',S.shop.id).eq('active',true).order('sort_order'),
    ]);
    S.svcs=sv||[];
  }
}

async function doAuth(mode){
  const isSignup=mode==='signup';
  const email=($i('ae').value||'').trim();
  const pass=$i('ap').value||'';
  const name=isSignup?($i('aname')?.value||'').trim():'';
  const phone=isSignup?($i('aphone')?.value||'').trim():'';
  const err=$i('aerr'), btn=$i('abtn');
  err.textContent='';

  if(!email){ err.textContent='Digite o e-mail.'; return; }
  if(pass.length<6){ err.textContent='Senha mínima: 6 caracteres.'; return; }
  if(isSignup && !name){ err.textContent='Digite seu nome.'; return; }

  btn.disabled=true;
  btn.textContent=isSignup?'Criando conta…':'Entrando…';

  try{
    if(isSignup){
      const {data,error}=await db.auth.signUp({
        email, password:pass,
        options:{ data:{ full_name:name, phone } }
      });
      if(error) throw error;

      // Se email de confirmação está ATIVADO no Supabase, session será null
      if(!data.session){
        // Mostra mensagem para confirmar e-mail
        document.getElementById('app').innerHTML=`
          <div class="auth-wrap">
            <div class="auth-card">
              <div class="auth-confirm">
                <h3>✉️ Confirme seu e-mail</h3>
                <p>Enviamos um link de confirmação para <strong>${email}</strong>.<br><br>Clique no link do e-mail para ativar sua conta e continuar.</p>
              </div>
              <p style="font-size:12.5px;color:var(--muted);text-align:center;margin-top:16px;">
                Não recebeu? Verifique a pasta de spam.<br>Ou desative a confirmação de e-mail em<br><strong>Supabase → Auth → Settings</strong>.
              </p>
            </div>
            <div style="margin-top:14px;text-align:center;">
              <button style="background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;" onclick="showAuth('login')">Já confirmei → Entrar</button>
            </div>
          </div>`;
        return;
      }
      // Confirmação desativada → session já existe, onAuthStateChange cuida do resto
    } else {
      const {error}=await db.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
    }
  }catch(e){
    const msg=e.message.includes('Invalid login')?'E-mail ou senha incorretos.':e.message.includes('already registered')?'E-mail já cadastrado. Faça login.':e.message.includes('Email not confirmed')?'E-mail não confirmado. Verifique sua caixa de entrada.':e.message;
    err.textContent=msg;
    btn.disabled=false;
    btn.textContent=isSignup?'Criar conta e configurar barbearia':'Entrar';
  }
}

function onNameInput(){ const el=$i('sslug'); if(!el._m) el.value=slugify($i('sname').value); updatePrev(); }

function updatePrev(){ const s=$i('sslug').value; $i('slug-prev').textContent=s?`${location.origin+location.pathname}?shop=${s}`:''; }
function renderSetupSvcs(){
  const ed=$i('svcedit'); if(!ed) return;
  ed.innerHTML=`<div class="svc-edit-header"><span>Serviço</span><span>Min.</span><span>R$</span><span></span></div>`;
  setupSvcs.forEach((sv,i)=>{
    const row=document.createElement('div'); row.className='svc-edit';
    row.innerHTML=`<input type="text" placeholder="Nome" value="${sv.name}" oninput="setupSvcs[${i}].name=this.value"><input type="number" placeholder="Min" value="${sv.duration}" oninput="setupSvcs[${i}].duration=+this.value" style="text-align:center;"><input type="number" placeholder="R$" value="${sv.price}" step="0.50" oninput="setupSvcs[${i}].price=+this.value" style="text-align:center;"><button class="rm-btn" onclick="setupSvcs.splice(${i},1);renderSetupSvcs()">×</button>`;
    ed.appendChild(row);
  });
}
function addSetupSvc(){ setupSvcs.push({name:'',duration:30,price:30}); renderSetupSvcs(); }
async function doSetup(){
  const name=($i('sname').value||'').trim(), slug=($i('sslug').value||'').trim();
  const err=$i('setup-err'), btn=$i('setup-btn');
  err.textContent='';
  if(!name){err.textContent='Digite o nome.';return;}
  if(slug.length<2){err.textContent='Slug muito curto.';return;}
  if(!/^[a-z0-9-]+$/.test(slug)){err.textContent='Slug: letras minúsculas, números e hífens.';return;}
  if(setupSvcs.length===0){err.textContent='Adicione ao menos um serviço.';return;}
  if(setupSvcs.some(s=>!s.name)){err.textContent='Preencha o nome de todos os serviços.';return;}
  const closedDays=[...document.querySelectorAll('.day-btn.closed')].map(b=>parseInt(b.dataset.day));
  btn.disabled=true; btn.textContent='Salvando…';
  try{
    const {data:shop,error:se}=await db.from('shops').insert({
      user_id:S.session.user.id, name, slug,
      open_time:$i('sopen').value, close_time:$i('sclose').value,
      lunch_start:$i('sls').value, lunch_end:$i('sle').value,
      closed_days:closedDays.join(','), slot_interval:30
    }).select().single();
    if(se) throw se;

    // Criar schedules para os 7 dias com base no horário padrão
    const scheds=[];
    for(let d=0;d<7;d++){
      scheds.push({shop_id:shop.id,day_of_week:d,is_open:!closedDays.includes(d),
        open_time:$i('sopen').value,close_time:$i('sclose').value,
        lunch_start:$i('sls').value,lunch_end:$i('sle').value});
    }
    await db.from('schedules').insert(scheds);
    await db.from('services').insert(setupSvcs.map((s,i)=>({shop_id:shop.id,name:s.name,duration:s.duration,price:s.price,active:true,sort_order:i})));

    S.shop=shop;
    const {data:sv}=await db.from('services').select('*').eq('shop_id',shop.id).order('sort_order');
    S.svcs=sv||[];
    toast('Barbearia criada! 🎉');
    showAdmin();
  }catch(e){
    err.textContent=e.code==='23505'?'Slug já em uso. Escolha outro.':'Erro: '+e.message;
    btn.disabled=false; btn.textContent='Salvar e abrir painel';
  }
}

async function renderAgenda(){

  const list=$i('alist'); if(!list) return;
  if(!appts||appts.length===0){ list.innerHTML=`<div class="empty">Nenhum agendamento em ${fDate(S.aDate)}.</div>`; return; }

function shiftDate(d){ const dt=new Date(S.aDate+'T00:00:00'); dt.setDate(dt.getDate()+d); S.aDate=`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`; renderAgenda(); }
async function cancelAppt(id){

  const {error}=await db.from('appointments').delete().eq('id',id);

async function saveNewSvc(){
  const name=($i('mn').value||'').trim(), dur=parseInt($i('md').value)||0, price=parseFloat($i('mp').value)||0;
  const err=$i('merr');
  if(!name){err.textContent='Digite o nome.';return;}
  if(dur<=0){err.textContent='Duração inválida.';return;}
  const {data,error}=await db.from('services').insert({shop_id:S.shop.id,name,duration:dur,price,active:true,sort_order:S.svcs.length}).select().single();
  if(error){err.textContent='Erro: '+error.message;return;}
  S.svcs.push(data); $i('svc-modal').remove(); renderServices(); toast('Serviço adicionado!');
}

/* -- DISPONIBILIDADE -- */
const DAYNAMES=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

async function renderAvail(){
  const b=$i('admin-body');
  b.innerHTML='<div class="mini-load"><div class="spinner"></div></div>';
  const [{data:scheds},{data:blocked}]=await Promise.all([
    db.from('schedules').select('*').eq('shop_id',S.shop.id).order('day_of_week'),
    db.from('blocked_slots').select('*').eq('shop_id',S.shop.id).gte('date',today()).order('date').order('time')
  ]);
  S.schedules=scheds||[];
  S.blocked=blocked||[];
  const sm={};
  S.schedules.forEach(s=>sm[s.day_of_week]=s);

  b.innerHTML=`
    <h3 style="font-family:'Anton',sans-serif;font-weight:400;font-size:18px;color:var(--ink);margin-bottom:12px;">Horário semanal</h3>
    <div id="sched-editor">
      ${DAYNAMES.map((day,dow)=>{
        const s=sm[dow]||{is_open:false,open_time:'09:00',close_time:'19:00',lunch_start:'12:00',lunch_end:'13:30'};
        return `
        <div class="sched-card ${s.is_open?'':'closed-day'}" id="scard-${dow}">
          <div class="sched-hdr">
            <label class="sched-toggle">
              <input type="checkbox" id="sc-${dow}" ${s.is_open?'checked':''} onchange="toggleDay(${dow})">
              <span>${day}</span>
            </label>
            <span class="sched-badge ${s.is_open?'open-badge':'closed-badge'}" id="sbadge-${dow}">${s.is_open?'Aberto':'Fechado'}</span>
          </div>
          <div class="sched-times" id="stimes-${dow}" style="${s.is_open?'':'display:none;'}">
            <div class="fld"><label>Abre</label><input type="time" id="so-${dow}" value="${s.open_time}"></div>
            <div class="fld"><label>Fecha</label><input type="time" id="sf-${dow}" value="${s.close_time}"></div>
            <div class="fld"><label>Almoço início</label><input type="time" id="sls-${dow}" value="${s.lunch_start}"></div>
            <div class="fld"><label>Almoço fim</label><input type="time" id="sle-${dow}" value="${s.lunch_end}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-p btn-block" style="margin-top:10px;" id="save-sched-btn" onclick="saveSchedules()">Salvar horário semanal</button>

    <h3 style="font-family:'Anton',sans-serif;font-weight:400;font-size:18px;color:var(--ink);margin:26px 0 4px;">Bloqueios</h3>
    <p style="font-size:13.5px;color:var(--muted);margin-bottom:14px;">Bloquear um dia inteiro ou um horário específico.</p>
    <div id="blist"></div>
    <button class="btn btn-g btn-block" style="margin-top:8px;" onclick="openBlockModal()">+ Adicionar bloqueio</button>
  `;
  renderBlockedList();
}

function toggleDay(dow){
  const open=$i(`sc-${dow}`).checked;
  const times=$i(`stimes-${dow}`); const card=$i(`scard-${dow}`); const badge=$i(`sbadge-${dow}`);
  times.style.display=open?'':'none';
  card.classList.toggle('closed-day',!open);
  badge.textContent=open?'Aberto':'Fechado';
  badge.className=`sched-badge ${open?'open-badge':'closed-badge'}`;
}

async function saveSchedules(){
  const btn=$i('save-sched-btn'); btn.disabled=true; btn.textContent='Salvando…';
  const upserts=[];
  for(let d=0;d<7;d++){
    const is_open=$i(`sc-${d}`)?.checked||false;
    upserts.push({
      shop_id:S.shop.id, day_of_week:d, is_open,
      open_time:$i(`so-${d}`)?.value||'09:00',
      close_time:$i(`sf-${d}`)?.value||'19:00',
      lunch_start:$i(`sls-${d}`)?.value||'12:00',
      lunch_end:$i(`sle-${d}`)?.value||'13:30',
    });
  }
  const {error}=await db.from('schedules').upsert(upserts,{onConflict:'shop_id,day_of_week'});
  btn.disabled=false; btn.textContent='Salvar horário semanal';
  if(error){toast('Erro: '+error.message);return;}
  const {data}=await db.from('schedules').select('*').eq('shop_id',S.shop.id).order('day_of_week');
  S.schedules=data||[];
  toast('Horário semanal salvo!');
}

function renderBlockedList(){
  const list=$i('blist'); if(!list) return;
  if(!S.blocked.length){ list.innerHTML='<div class="empty" style="padding:16px;">Nenhum bloqueio cadastrado.</div>'; return; }
  list.innerHTML='';
  S.blocked.forEach(b=>{
    const row=document.createElement('div'); row.className='block-row';
    row.innerHTML=`<div class="block-info"><span class="block-date">${new Date(b.date+'T00:00:00').toLocaleDateString('pt-BR')}</span> · <span class="block-time">${b.time||'Dia todo'}</span>${b.reason?`<br><span style="font-size:12px;color:var(--muted);">${b.reason}</span>`:''}</div><button class="btn btn-r btn-sm" onclick="deleteBlock('${b.id}')">×</button>`;
    list.appendChild(row);
  });
}

function openBlockModal(){
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='block-modal';
  ov.innerHTML=`<div class="modal-box"><h3>Adicionar bloqueio</h3>
    <div class="fld"><label>Data</label><input type="date" id="bd" min="${today()}"></div>
    <div class="fld"><label>Horário <span style="font-weight:400;color:var(--muted);">(deixe vazio para bloquear o dia todo)</span></label><input type="time" id="bt"></div>
    <div class="fld" style="margin-bottom:0;"><label>Motivo <span style="font-weight:400;color:var(--muted);">(opcional)</span></label><input type="text" id="br" placeholder="ex: Consulta médica"></div>
    <p id="bmerr" class="ferr" style="margin-top:10px;min-height:18px;"></p>
    <div class="modal-footer"><button class="btn btn-g" onclick="$i('block-modal').remove()">Cancelar</button><button class="btn btn-p" onclick="saveBlock()">Salvar bloqueio</button></div>
  </div>`;
  document.body.appendChild(ov);
}

async function saveBlock(){
  const date=$i('bd').value, time=$i('bt').value||null, reason=($i('br').value||'').trim()||null;
  const err=$i('bmerr');
  if(!date){err.textContent='Selecione uma data.';return;}
  const {data,error}=await db.from('blocked_slots').insert({shop_id:S.shop.id,date,time,reason}).select().single();
  if(error){err.textContent='Erro: '+error.message;return;}
  S.blocked.push(data);
  S.blocked.sort((a,b)=>(a.date+(a.time||'00:00')).localeCompare(b.date+(b.time||'00:00')));
  $i('block-modal').remove(); renderBlockedList(); toast('Bloqueio adicionado!');
}

async function deleteBlock(id){
  const {error}=await db.from('blocked_slots').delete().eq('id',id);
  if(error){toast('Erro: '+error.message);return;}
  S.blocked=S.blocked.filter(b=>b.id!==id); renderBlockedList(); toast('Bloqueio removido.');
}

/* -- CONFIG -- */
function renderConfig(){
  const link=`${location.origin}${location.pathname}?shop=${S.shop.slug}`;
  $i('admin-body').innerHTML=`
    <div class="card" style="margin-bottom:14px;">
      <label style="margin-bottom:8px;display:block;">Link público</label>
      <div class="link-box">${link}</div>
      <button class="btn btn-p" onclick="copyLink('${link}')">Copiar link</button>
    </div>
    <button class="btn btn-g btn-block" onclick="db.auth.signOut()">Sair da conta</button>`;
}
function copyLink(link){ navigator.clipboard.writeText(link).then(()=>toast('Link copiado!')).catch(()=>{try{prompt('Copie:',link);}catch(e){}}); }

/* =================== BOOKING =================== */
async function loadBooking(slug){
  const {data:shop}=await db.from('shops').select('*').eq('slug',slug).maybeSingle();
  if(!shop){ document.getElementById('app').innerHTML='<div class="loadscreen"><p style="color:var(--red);">Barbearia não encontrada.</p></div>'; return; }
  const [{data:svcs},{data:scheds}]=await Promise.all([
    db.from('services').select('*').eq('shop_id',shop.id).eq('active',true).order('sort_order'),
    db.from('schedules').select('*').eq('shop_id',shop.id).order('day_of_week')
  ]);
  S.bShop=shop; S.bSvcs=svcs||[]; S.bScheds=scheds||[]; S.sel=emptysel();
  bRender(1);
}

function bHeader(){
  return `<div class="stripe"></div><header class="bhero"><div class="bhero-inner"><div class="b-scissors"><svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:40px;height:40px;"><circle cx="14" cy="14" r="6" stroke="currentColor" stroke-width="2.5"/><circle cx="14" cy="34" r="6" stroke="currentColor" stroke-width="2.5"/><path d="M18 18L40 40M40 8L18 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></div><h1 class="bshop">${S.bShop.name}</h1><p class="bshop-s">BARBEARIA</p></div></header>`;
}
function bBar(cur){
  const L=['Serviço','Data','Horário','Dados','Confirmar'];
  return `<div class="steps-bar">${L.map((_,i)=>{const n=i+1;const c=n===cur?'sdot on':n<cur?'sdot done':'sdot';const l=n<L.length?`<div class="sline ${n<cur?'done':''}"></div>`:'';return `<div class="sdot-wrap"><div class="${c}">${n}</div>${l}</div>`;}).join('')}</div>`;
}
function bRender(step){
  document.getElementById('app').innerHTML=`<div class="bwrap">${bHeader()}<div id="bbar">${bBar(step)}</div><main class="bmain"><div id="bc"></div></main><div style="padding:16px 24px 28px;text-align:center;font-size:12px;color:var(--muted);">AgendaBarber</div></div>`;
  bStep(step);
}
function bGoTo(step){ const bb=$i('bbar'); if(bb) bb.innerHTML=bBar(step); bStep(step); window.scrollTo({top:0,behavior:'smooth'}); }
function bStep(step){ const c=$i('bc'); if(!c) return; if(step===1)b1(c);else if(step===2)b2(c);else if(step===3)b3(c);else if(step===4)b4(c);else b5(c); }

function b1(c){
  c.innerHTML=`<h2 class="btitle">Escolha o serviço</h2><p class="bhint">Toque em um serviço para continuar.</p><div id="bsl"></div>`;
  const list=$i('bsl');
  S.bSvcs.forEach(sv=>{
    const btn=document.createElement('button'); btn.className='svc-card';
    btn.innerHTML=`<div><p class="scname">${sv.name}</p><p class="scmeta">${sv.duration} min</p></div><div class="scprice">${fPrice(sv.price)}</div>`;
    btn.onclick=()=>{ S.sel.svcId=sv.id; S.sel.svc=sv; S.sel.date=null; S.sel.time=null; bGoTo(2); };
    list.appendChild(btn);
  });
}

function b2(c){
  // Determina dias fechados a partir dos schedules
  const closedDows=S.bScheds.filter(s=>!s.is_open).map(s=>s.day_of_week);
  const dayNames=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const closedStr=closedDows.length?closedDows.map(d=>dayNames[d]).join(', '):'—';
  const minD=today();
  const maxD=(()=>{const d=new Date();d.setDate(d.getDate()+45);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;})();
  c.innerHTML=`
    <button class="bback" onclick="bGoTo(1)">← Trocar serviço</button>
    <h2 class="btitle">Escolha a data</h2>
    <p class="bhint">Fechado: ${closedStr}.</p>
    <div class="fld"><input type="date" id="b-date" min="${minD}" max="${maxD}" value="${S.sel.date||''}"></div>
    <p id="bclosed" class="ferr" style="display:none;">Fechado nesse dia. Escolha outra data.</p>`;
  $i('b-date').onchange=()=>{
    const val=$i('b-date').value; if(!val) return;
    const dow=new Date(val+'T00:00:00').getDay();
    const sched=S.bScheds.find(s=>s.day_of_week===dow);
    // fallback: se não tiver schedule, usa closed_days do shop
    const isOpen=sched?sched.is_open:!( (S.bShop.closed_days||'0,1').split(',').filter(Boolean).map(Number).includes(dow));
    if(!isOpen){ $i('bclosed').style.display='block'; return; }
    $i('bclosed').style.display='none';
    S.sel.date=val; S.sel.time=null; bGoTo(3);
  };
}

async function b3(c){
  const sv=S.sel.svc;
  c.innerHTML=`<button class="bback" onclick="bGoTo(2)">← Trocar data</button><h2 class="btitle">Escolha o horário</h2><p class="bhint">${fDate(S.sel.date)} · ${sv.name} (${sv.duration} min)</p><div id="bsl"><div class="mini-load"><div class="spinner"></div></div></div>`;

  const dow=new Date(S.sel.date+'T00:00:00').getDay();
  const sched=S.bScheds.find(s=>s.day_of_week===dow);

  // Se não tiver schedule no banco, usa configuração legacy do shop
  const sh=S.bShop;
  const openM =toMin(sched?sched.open_time  :sh.open_time  ||'09:00');
  const closeM=toMin(sched?sched.close_time :sh.close_time ||'19:00');
  const lsM   =toMin(sched?sched.lunch_start:sh.lunch_start||'12:00');
  const leM   =toMin(sched?sched.lunch_end  :sh.lunch_end  ||'13:30');
  const interval=sh.slot_interval||30;
  const isToday=S.sel.date===today();
  const nowM=new Date().getHours()*60+new Date().getMinutes()+15;

  const [{data:appts},{data:blocks}]=await Promise.all([
    db.from('appointments').select('time,duration').eq('shop_id',sh.id).eq('date',S.sel.date),
    db.from('blocked_slots').select('time').eq('shop_id',sh.id).eq('date',S.sel.date)
  ]);

  // Dia todo bloqueado?
  const fullBlock=(blocks||[]).some(b=>b.time===null);
  const blockedSet=new Set((blocks||[]).map(b=>b.time).filter(Boolean));

  const wrap=$i('bsl'); if(!wrap) return;

  if(fullBlock){
    wrap.innerHTML=`<div class="empty">Sem atendimento nesse dia.<br><button class="btn btn-g" style="margin-top:12px;" onclick="bGoTo(2)">Escolher outra data</button></div>`;
    return;
  }

  const slots=[];
  for(let t=openM; t+sv.duration<=closeM; t+=interval){
    if(t<leM && t+sv.duration>lsM) continue;    // almoço
    if(isToday && t<=nowM) continue;             // passou
    if(blockedSet.has(fromMin(t))) continue;     // horário bloqueado
    const busy=(appts||[]).some(a=>{const as=toMin(a.time),ae=as+a.duration;return t<ae&&(t+sv.duration)>as;});
    if(!busy) slots.push(fromMin(t));
  }

  if(!slots.length){
    wrap.innerHTML=`<div class="empty">Nenhum horário disponível nesse dia.<br><button class="btn btn-g" style="margin-top:12px;" onclick="bGoTo(2)">Escolher outra data</button></div>`;
    return;
  }
  const grid=document.createElement('div'); grid.className='slots-grid';
  slots.forEach(t=>{
    const btn=document.createElement('button'); btn.className='slot-btn'; btn.textContent=t;
    btn.onclick=()=>{ S.sel.time=t; bGoTo(4); };
    grid.appendChild(btn);
  });
  wrap.innerHTML=''; wrap.appendChild(grid);
}

function b4(c){
  c.innerHTML=`<button class="bback" onclick="bGoTo(3)">← Trocar horário</button><h2 class="btitle">Seus dados</h2><p class="bhint">Para confirmarmos seu horário.</p><div class="fld"><label>Nome</label><input id="b-name" type="text" placeholder="Seu nome completo" value="${S.sel.name}" autocomplete="name"></div><div class="fld"><label>Telefone / WhatsApp</label><input id="b-phone" type="tel" placeholder="(37) 99999-9999" value="${S.sel.phone}" autocomplete="tel"></div><p id="b4err" class="ferr" style="min-height:18px;margin-bottom:10px;"></p><button class="btn btn-p btn-block" onclick="b4next()">Revisar agendamento</button>`;
}
function b4next(){
  const name=($i('b-name').value||'').trim(), phone=($i('b-phone').value||'').trim();
  const err=$i('b4err'); err.textContent='';
  if(name.length<2){err.textContent='Digite seu nome.';return;}
  if(phone.replace(/\D/g,'').length<10){err.textContent='Telefone inválido.';return;}
  S.sel.name=name; S.sel.phone=phone; bGoTo(5);
}

function b5(c){
  const sv=S.sel.svc;
  c.innerHTML=`<button class="bback" onclick="bGoTo(4)">← Editar dados</button><h2 class="btitle">Confirme</h2><div class="sum-card"><div class="sum-row"><span>Serviço</span><span>${sv.name}</span></div><div class="sum-row"><span>Data</span><span>${fDate(S.sel.date)}</span></div><div class="sum-row"><span>Horário</span><span>${S.sel.time}</span></div><div class="sum-row"><span>Duração</span><span>${sv.duration} min</span></div><div class="sum-row"><span>Valor</span><span>${fPrice(sv.price)}</span></div><div class="sum-row"><span>Nome</span><span>${S.sel.name}</span></div><div class="sum-row"><span>Telefone</span><span>${S.sel.phone}</span></div></div><p id="b5err" class="ferr" style="margin:10px 0;min-height:18px;"></p><button class="btn btn-p btn-block" id="b5btn" onclick="bConfirm()">Confirmar agendamento</button>`;
}

async function bConfirm(){
  const btn=$i('b5btn'), err=$i('b5err');
  btn.disabled=true; btn.textContent='Confirmando…'; err.textContent='';
  try{
    const sh=S.bShop, sv=S.sel.svc;
    const [{data:existing},{data:blocks}]=await Promise.all([
      db.from('appointments').select('time,duration').eq('shop_id',sh.id).eq('date',S.sel.date),
      db.from('blocked_slots').select('time').eq('shop_id',sh.id).eq('date',S.sel.date)
    ]);
    // checar bloqueio de última hora
    const fullBlock=(blocks||[]).some(b=>b.time===null);
    const blockedSet=new Set((blocks||[]).map(b=>b.time).filter(Boolean));
    if(fullBlock||blockedSet.has(S.sel.time)){
      err.textContent='Esse horário não está mais disponível.';
      btn.disabled=false; btn.textContent='Confirmar agendamento';
      setTimeout(()=>bGoTo(3),1600); return;
    }
    const conflict=(existing||[]).some(a=>{const as=toMin(a.time),ae=as+a.duration,ts=toMin(S.sel.time),te=ts+sv.duration;return ts<ae&&te>as;});
    if(conflict){ err.textContent='Horário ocupado. Escolha outro.'; btn.disabled=false; btn.textContent='Confirmar agendamento'; setTimeout(()=>bGoTo(3),1600); return; }
    const [,mm,dd]=S.sel.date.split('-');
    const prefix=sh.slug.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3);
    const ticketNumber=`${prefix}-${dd}${mm}-${pad((existing||[]).length+1)}`;
    const {error}=await db.from('appointments').insert({shop_id:sh.id,ticket_number:ticketNumber,service_id:sv.id,service_name:sv.name,duration:sv.duration,price:sv.price,date:S.sel.date,time:S.sel.time,name:S.sel.name,phone:S.sel.phone});
    if(error) throw error;
    bTicket(ticketNumber);
  }catch(e){ err.textContent='Erro: '+e.message; btn.disabled=false; btn.textContent='Confirmar agendamento'; }
}

function bTicket(ticket){
  const sv=S.sel.svc;
  const bb=$i('bbar'); if(bb) bb.style.display='none';
  const c=$i('bc'); if(!c) return;
  c.innerHTML=`<div style="margin-top:14px;"><div class="ticket"><div class="ticket-m"><div class="tsuccess">✓ Confirmado</div><h3>${sv.name}</h3><div class="sum-card" style="border:none;padding:0;"><div class="sum-row"><span>Data</span><span>${fDate(S.sel.date)}</span></div><div class="sum-row"><span>Horário</span><span>${S.sel.time}</span></div><div class="sum-row"><span>Nome</span><span>${S.sel.name}</span></div><div class="sum-row"><span>Valor</span><span>${fPrice(sv.price)}</span></div></div></div><div class="ticket-s"><div style="position:absolute;left:0;top:8px;bottom:8px;width:0;border-left:2px dashed rgba(242,233,214,.3);"></div><div class="tnl">SENHA</div><div class="tnum">${ticket}</div></div></div><button class="btn btn-g btn-block" style="margin-top:14px;" onclick="S.sel=emptysel();const bb=$i('bbar');if(bb)bb.style.display='';bGoTo(1);">Novo agendamento</button></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
