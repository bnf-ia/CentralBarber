<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgendaBarber</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1E17;--ink2:#0A1510;--paper:#F7F5F0;--card:#FFFFFF;--brass:#C79A4A;--brd:#B3863A;--red:#9C3B2E;--green:#2D6A4F;--wa:#25D366;--text:#2B2620;--muted:#6E6354;--line:#E5E1D6;--r:16px;
  --sidebar-w:260px;--header-h:75px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;width:100%;}
body{background:var(--paper);color:var(--text);font-family:'Work Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;width:100%;}
#app{min-height:100vh;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 20px;border-radius:10px;border:none;font-family:'Work Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;gap:8px;white-space:nowrap;touch-action:manipulation;}
.btn-block{display:flex;width:100%;}
.btn-p{background:var(--brass);color:#fff;}.btn-p:hover{background:var(--brd);}.btn-p:disabled{opacity:.45;cursor:not-allowed;}
.btn-g{background:transparent;color:var(--ink);border:1.5px solid var(--line);}.btn-g:hover{border-color:var(--brass);}
.btn-r{background:transparent;color:var(--red);border:1.5px solid var(--red);}.btn-r:hover{background:var(--red);color:#fff;}
.btn-wa{background:var(--wa);color:#fff;}.btn-wa:hover{background:#1da851;}
.btn-sm{padding:8px 13px;font-size:13px;}
input,select,textarea{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);font-size:16px;font-family:'Work Sans',sans-serif;color:var(--text);touch-action:manipulation;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brass);border-color:var(--brass);}
textarea{resize:vertical;min-height:70px;}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.fld{margin-bottom:14px;}.ferr{color:var(--red);font-size:12.5px;margin-top:5px;}.fhint{font-size:12.5px;color:var(--muted);margin-top:5px;}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 2px 10px rgba(15,30,23,.06);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.two-col .fld{margin-bottom:0;}
.loadscreen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;color:var(--muted);}
.mini-load{display:flex;align-items:center;justify-content:center;padding:28px;gap:10px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--brass);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;animation:tIn .25s ease;white-space:nowrap;max-width:90vw;text-align:center;}
.toast-ok{background:var(--green);color:#fff;}
.toast-err{background:var(--red);color:#fff;}
.toast-info{background:var(--ink);color:var(--paper);}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
/* LANDING */
.lp-wrap{min-height:100vh;background:radial-gradient(140% 160% at 50% -10%,var(--ink) 0%,var(--ink2) 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 48px;text-align:center;}
.lp-icon{width:52px;height:52px;margin:0 auto 14px;color:var(--brass);}
.lp-title{font-family:'Anton',sans-serif;font-size:44px;color:#FBF4E3;letter-spacing:.5px;line-height:1;}
.lp-tagline{font-size:14px;color:#A9C4B0;margin-top:8px;}
.lp-search{width:100%;max-width:400px;margin:34px auto 0;text-align:left;position:relative;}
.lp-search-label{color:#D9CFB8;font-size:13px;font-weight:600;display:block;margin-bottom:8px;}
.lp-input-wrap{display:flex;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.35);}
.lp-name-input{flex:1;background:rgba(255,255,255,.10);border:none;color:#fff;font-size:16px;padding:15px 16px;font-family:'Work Sans',sans-serif;outline:none;min-width:0;touch-action:manipulation;}
.lp-name-input::placeholder{color:rgba(255,255,255,.32);}
.lp-name-input:focus{background:rgba(255,255,255,.15);}
.lp-results{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:#1E3D2F;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:10;}
.lp-res-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);transition:.15s;}
.lp-res-item:last-child{border-bottom:none;}.lp-res-item:hover{background:rgba(255,255,255,.08);}
.lp-res-name{font-weight:600;font-size:15px;color:#FBF4E3;}.lp-res-addr{font-size:12px;color:#7FA98C;margin-top:2px;}.lp-res-arrow{color:var(--brass);font-size:16px;}
.lp-res-empty{padding:16px;text-align:center;font-size:14px;}
.lp-searching{padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;color:#7FA98C;font-size:14px;}
.lp-div{width:100%;max-width:400px;margin:36px auto 0;display:flex;align-items:center;gap:12px;}
.lp-div::before,.lp-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.09);}
.lp-div span{color:rgba(255,255,255,.25);font-size:12px;}
.lp-barber-btn{margin-top:16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:#C4D8C9;border-radius:10px;padding:13px 24px;font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;touch-action:manipulation;}
.lp-barber-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.lp-footer{margin-top:44px;font-size:12px;color:rgba(255,255,255,.18);}
/* AUTH */
.auth-wrap{min-height:100vh;background:radial-gradient(140% 160% at 50% -10%,var(--ink) 0%,var(--ink2) 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.auth-card{width:100%;max-width:420px;background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:28px 28px 24px;}
.auth-brand{text-align:center;margin-bottom:20px;}.auth-brand h1{font-family:'Anton',sans-serif;font-size:24px;color:var(--ink);}.auth-brand em{color:var(--brass);font-style:normal;}.auth-brand p{font-size:13px;color:var(--muted);margin-top:4px;}
.auth-tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;font-weight:600;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;touch-action:manipulation;}
.auth-tab.on{color:var(--brd);border-bottom-color:var(--brass);}
.auth-confirm{background:#EDF7F0;border:1.5px solid #A8D5B5;border-radius:12px;padding:18px;text-align:center;}.auth-confirm h3{font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px;}.auth-confirm p{font-size:13.5px;color:#4A7A5A;line-height:1.5;}
.auth-back{background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;margin-top:14px;touch-action:manipulation;}.auth-back:hover{color:rgba(255,255,255,.8);}
/* SETUP */
.setup-wrap{max-width:600px;margin:0 auto;padding:28px 18px 56px;}
.setup-head{text-align:center;margin-bottom:28px;}.setup-head h1{font-family:'Anton',sans-serif;font-size:28px;color:var(--ink);}.setup-head p{color:var(--muted);margin-top:6px;font-size:14.5px;}
.sec-title{font-family:'Anton',sans-serif;font-size:17px;color:var(--ink);margin:22px 0 10px;font-weight:400;display:flex;align-items:center;gap:8px;}
.svc-edit-hdr{display:grid;grid-template-columns:1fr 72px 80px auto;gap:8px;padding:0 12px;margin-bottom:4px;}
.svc-edit-hdr span{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.svc-edit{display:grid;grid-template-columns:1fr 72px 80px auto;gap:8px;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.svc-edit input{padding:8px 10px;font-size:14px;}
.rm-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px 6px;touch-action:manipulation;}.rm-btn:hover{color:var(--red);}
.add-svc{background:none;border:1.5px dashed var(--line);border-radius:10px;padding:11px;width:100%;font-size:14px;color:var(--muted);cursor:pointer;margin-top:4px;touch-action:manipulation;}.add-svc:hover{border-color:var(--brass);color:var(--brd);}
.day-btn{padding:6px 11px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;transition:.15s;touch-action:manipulation;}.day-btn.closed{background:var(--red);color:#fff;border-color:var(--red);}
/* ===== CENTRAL BARBER — ESTRUTURA GLOBAL ===== */
.admin-wrap{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;grid-template-areas:"sidebar header" "sidebar main";min-height:100vh;background:var(--paper);}

/* SIDEBAR */
.cb-sidebar{grid-area:sidebar;background:var(--ink);color:#F7F5F0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:20;}
.admin-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:18px 12px;overflow-x:visible;border-bottom:none;background:transparent;}
.admin-nav::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 14px;border-radius:12px;font-size:14.5px;font-weight:600;color:#C9D4CC;background:none;border:none;border-bottom:none;margin-bottom:0;cursor:pointer;transition:.15s;white-space:nowrap;touch-action:manipulation;}
.nav-tab:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-tab.on{background:var(--brass);color:#1A1208;border-bottom-color:transparent;}
.cb-sidebar-foot{padding:14px 12px 18px;border-top:1px solid rgba(255,255,255,.08);}

/* HEADER */
.admin-hdr{grid-area:header;background:var(--card);color:var(--ink);padding:0 24px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1.5px solid var(--line);}
.cb-header-brand{display:flex;align-items:center;gap:12px;}
.cb-header-logo-mark{width:42px;height:42px;border-radius:12px;background:var(--ink);color:var(--brass);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:19px;flex-shrink:0;}
.cb-header-brandtext{display:flex;flex-direction:column;line-height:1.25;}
.admin-logo{font-family:'Anton',sans-serif;font-size:17px;color:var(--ink);}.admin-logo em{color:var(--brass);font-style:normal;}
.cb-header-slogan{font-size:11.5px;color:var(--muted);font-weight:500;}
.shop-tag{font-size:12px;color:var(--brd);font-weight:600;margin-left:8px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cb-header-right{display:flex;align-items:center;gap:14px;}
.icon-btn{background:var(--paper);border:1.5px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}.icon-btn:hover{border-color:var(--brass);}
.cb-avatar{width:38px;height:38px;border-radius:50%;background:var(--brass);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14.5px;flex-shrink:0;}

/* CONTEÚDO PRINCIPAL */
.admin-body{grid-area:main;flex:1;padding:28px 32px 56px;max-width:1100px;margin:0;width:100%;overflow-x:hidden;}

@media (max-width:900px){
  .admin-wrap{grid-template-columns:1fr;grid-template-rows:var(--header-h) auto 1fr;grid-template-areas:"header" "navmobile" "main";}
  .cb-sidebar{position:static;height:auto;flex-direction:row;grid-area:navmobile;}
  .admin-nav{flex-direction:row;overflow-x:auto;padding:10px 12px;}
  .cb-sidebar-foot{display:none;}
  .admin-body{padding:18px 16px 56px;}
  .admin-hdr{padding:0 16px;}
  .cb-header-slogan,.shop-tag{display:none;}
  .cb-header-brand{gap:10px;}
}
/* DASHBOARD (Central Barber) */
.dash-sec{font-family:'Anton',sans-serif;font-size:17px;color:var(--ink);font-weight:400;margin:22px 0 12px;}
.dbx{display:flex;flex-direction:column;gap:32px;}
/* linha 1 — cards estatísticos */
.dbx-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.dbx-stat-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,30,23,.06);display:flex;align-items:center;gap:14px;height:100%;min-height:96px;}
.dbx-stat-icon{width:48px;height:48px;border-radius:12px;background:var(--paper);color:var(--brass);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.dbx-stat-text{min-width:0;}
.dbx-stat-title{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.dbx-stat-value{font-family:'Anton',sans-serif;font-size:26px;color:var(--ink);font-weight:400;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* linha 2 — agenda do dia (70%) + resumo financeiro (30%) */
.dbx-row2{display:grid;grid-template-columns:7fr 3fr;gap:16px;align-items:start;}
.dbx-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,30,23,.06);}
.dbx-card-title{font-family:'Anton',sans-serif;font-size:16px;font-weight:400;color:var(--ink);margin-bottom:14px;}
.dbx-agenda-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
.dbx-agenda-item:last-child{border-bottom:none;}
.dbx-agenda-time{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px;color:var(--brd);width:48px;flex-shrink:0;}
.dbx-agenda-info{flex:1;min-width:0;}
.dbx-agenda-client{font-weight:600;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-agenda-svc{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-status{font-size:11px;font-weight:700;letter-spacing:.4px;padding:4px 9px;border-radius:7px;background:#D1EBD9;color:var(--green);flex-shrink:0;white-space:nowrap;}
.dbx-fin-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
.dbx-fin-row:last-child{border-bottom:none;}
.dbx-fin-label{font-size:13.5px;color:var(--muted);}
.dbx-fin-value{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:#C79A4A;}
/* linha 3 — clientes recentes + gráfico */
.dbx-row3{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.dbx-client-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
.dbx-client-item:last-child{border-bottom:none;}
.dbx-avatar{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#F7F5F0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.dbx-client-info{min-width:0;}
.dbx-client-name{font-weight:600;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-client-svc{font-size:12.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dbx-chart-wrap{overflow:hidden;}
.dbx-empty{text-align:center;padding:24px 10px;color:var(--muted);font-size:13.5px;}
@media (max-width:900px){
  .dbx-stats{grid-template-columns:1fr 1fr;}
  .dbx-stat-value{font-size:20px;}
  .dbx-row2{grid-template-columns:1fr;}
  .dbx-row3{grid-template-columns:1fr;}
}
@media (max-width:480px){
  .dbx-stats{grid-template-columns:1fr;}
}
/* AGENDA */
.dn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}.dn:hover{border-color:var(--brass);}
.empty{text-align:center;padding:28px 14px;color:var(--muted);font-size:14px;background:var(--card);border:1.5px dashed var(--line);border-radius:var(--r);line-height:1.6;}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.page-title{font-family:'Anton',sans-serif;font-weight:400;font-size:24px;color:var(--ink);letter-spacing:.3px;}
.agenda-layout{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(0,1fr);gap:20px;align-items:start;min-width:0;}
.agenda-cal-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,30,23,.06);min-width:0;max-width:100%;overflow:hidden;}
.cal-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.cal-month-label{font-family:'Anton',sans-serif;font-weight:400;font-size:16px;color:var(--ink);text-transform:capitalize;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-bottom:6px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13.5px;color:var(--text);cursor:pointer;transition:.15s;}
.cal-cell.empty{cursor:default;}
.cal-cell.day:hover{background:var(--paper);}
.cal-cell.is-today{color:var(--brd);font-weight:700;}
.cal-cell.selected{background:var(--brass);color:#fff;font-weight:700;}
.cal-cell.selected.is-today{color:#fff;}
.agenda-side{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,30,23,.06);min-width:0;max-width:100%;overflow:hidden;}
.agenda-side-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.agenda-side-title{font-family:'Anton',sans-serif;font-weight:400;font-size:16px;color:var(--ink);text-transform:capitalize;}
.agenda-day-nav{display:flex;gap:8px;}
.agenda-appt-card{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;transition:.15s;}
.agenda-appt-card:hover{border-color:var(--brass);box-shadow:0 4px 14px rgba(27,58,47,.08);transform:translateY(-1px);}
.agenda-appt-card:last-child{margin-bottom:0;}
.agenda-appt-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.agenda-appt-top .btn{margin-left:auto;flex-shrink:0;}
.agenda-appt-time{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px;color:var(--brd);background:var(--paper);padding:3px 10px;border-radius:7px;flex-shrink:0;}
.agenda-appt-client{font-weight:700;font-size:14.5px;color:var(--ink);}
.agenda-appt-svc{font-size:13px;color:var(--muted);margin-bottom:2px;}
.agenda-appt-meta{font-size:12.5px;color:var(--muted);}
.agenda-appt-card.is-cancelled{opacity:.55;border-style:dashed;}
@media (max-width:900px){.agenda-layout{grid-template-columns:minmax(0,1fr);}}
/* CLIENTS */
.clients-head-actions{display:flex;align-items:center;gap:12px;}
.search-wrap-new{position:relative;width:240px;}.search-wrap-new input{padding-left:38px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.clients-grid{display:flex;flex-direction:column;gap:16px;}
.client-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(15,30,23,.06);display:flex;align-items:center;gap:16px;cursor:pointer;transition:.15s;min-width:0;max-width:100%;}
.client-card:hover{box-shadow:0 4px 16px rgba(15,30,23,.1);transform:translateY(-1px);}
.client-card-avatar{width:52px;height:52px;border-radius:50%;background:var(--ink);color:#F7F5F0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;flex-shrink:0;}

/* Retorna quantas horas faltam para o agendamento */
function hoursUntil(date, time){
  const apptMs=new Date(date+'T'+time+':00').getTime();
  return (apptMs - Date.now()) / 3600000;
}
/* Retorna true se ainda pode cancelar pelo prazo configurado */
function canCancel(date, time, cancelHours){
  const h = (cancelHours != null && cancelHours !== '') ? Number(cancelHours) : 2;
  return hoursUntil(date, time) > h;
}

/* ── UTILS ── */
function today(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function toMin(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function fromMin(m){ return pad(Math.floor(m/60))+':'+pad(m%60); }
function fPrice(p){ return 'R$\u00a0'+Number(p||0).toFixed(2).replace('.',','); }
function fDate(ds){ const d=new Date(ds+'T00:00:00'); return d.toLocaleDateString('pt-BR')+' ('+'dom,seg,ter,qua,qui,sex,s\u00e1b'.split(',')[d.getDay()]+')'; }
function slugify(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function sanitize(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function toast(msg, type='info', ms=3000){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast toast-'+type; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),ms);
}

/* ── DB HELPERS (direct fetch, bypass client for reliability) ── */
async function _db(method, table, params, body, userToken, prefer){
  const qs=Object.entries(params||{}).map(([k,v])=>k+'='+encodeURIComponent(String(v))).join('&');
  const url=SUPABASE_URL+'/rest/v1/'+table+(qs?'?'+qs:'');
  const headers={
    'apikey':SUPABASE_JWT,
    'Authorization':'Bearer '+(userToken||SUPABASE_JWT),
    'Content-Type':'application/json',
    'Accept':'application/json',
  };
  if(prefer) headers['Prefer']=prefer;
  else if(method==='POST'||method==='PATCH') headers['Prefer']='return=representation';
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),12000);
  try{
    const r=await fetch(url,{method,signal:ctrl.signal,headers,body:body!=null?JSON.stringify(body):undefined});
    clearTimeout(t);
    if(r.status===204||r.status===205) return null;
    const txt=await r.text();
    if(!r.ok){ let msg='HTTP '+r.status; try{ msg=(JSON.parse(txt).message)||msg; }catch(e){} throw new Error(msg); }
    return txt?JSON.parse(txt):null;
  }catch(e){ clearTimeout(t); if(e.name==='AbortError') throw new Error('Sem resposta do servidor. Verifique a conex\u00e3o.'); throw e; }
}
const dbGet =(t,p,tk)   =>_db('GET',   t,p,null,tk);
const dbPost=(t,b,tk)   =>_db('POST',  t,{},b,tk);
const dbPatch=(t,p,b,tk)=>_db('PATCH', t,p,b,tk);
const dbDel =(t,p,tk)   =>_db('DELETE',t,p,null,tk);
const dbUpsert=(t,conflict,b,tk)=>_db('POST',t,{'on_conflict':conflict},b,tk,'resolution=merge-duplicates,return=representation');

/* ── ROUTER ── */
async function init(){
  const slug=new URLSearchParams(location.search).get('shop');
  try{
    const {data:{session}}=await Promise.race([
      db.auth.getSession(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),7000))
    ]);
    S.session=session;
    if(slug) return loadBooking(slug);
    if(S.session){ await loadOwner(); return S.shop?showAdmin():showSetup(); }
  }catch(e){
    if(slug) return loadBooking(slug);
  }
  showLanding();
}

db.auth.onAuthStateChange(async(ev,session)=>{
  if(new URLSearchParams(location.search).get('shop')) return;
  const wasIn=!!S.session; S.session=session;
  if(ev==='PASSWORD_RECOVERY'){ showNewPassword(); return; }
  if(ev==='SIGNED_OUT'&&wasIn){ S.shop=null;S.svcs=[];clearOverlays();showLanding(); }
});

async function loadOwner(){
  if(!S.session) return;
  try{
    const rows=await dbGet('shops',{'user_id':'eq.'+S.session.user.id,'select':'*','limit':1},tok());
    S.shop=(rows&&rows[0])||null;
    if(S.shop){
      const sv=await dbGet('services',{'shop_id':'eq.'+S.shop.id,'active':'eq.true','order':'sort_order','select':'*'},tok());
      S.svcs=sv||[];
    }
  }catch(e){ console.error('loadOwner:',e.message); }
}

  const q=($i('lp-q').value||'').trim();
  clearTimeout(_lpT);

async function lpSearch(q){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),9000);
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/shops?select=id,name,slug,address,barber_name',{
      signal:ctrl.signal,
      headers:{'apikey':SUPABASE_JWT,'Authorization':'Bearer '+SUPABASE_JWT}
    });
    clearTimeout(timer);
    const res=$i('lp-res'); if(!res) return;
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    const found=(data||[]).filter(s=>(s.name||'').toLowerCase().includes(q.toLowerCase())).slice(0,6);
    if(!found.length){ res.innerHTML='<div class="lp-results"><div class="lp-res-empty" style="color:var(--muted)">Nenhuma barbearia encontrada.</div></div>'; return; }
    res.innerHTML='<div class="lp-results">'+found.map(s=>{
      const slug=encodeURIComponent(s.slug);
      const addr=s.address?'<div class="lp-res-addr">'+sanitize(s.address)+'</div>':'';
      return '<div class="lp-res-item" onclick="location.href=location.pathname+\'?shop='+s.slug+'\'">'
        +'<div><div class="lp-res-name">'+sanitize(s.name)+'</div>'+addr+'</div>'
        +'<span class="lp-res-arrow">\u2192</span></div>';
    }).join('')+'</div>';
  }catch(e){
    clearTimeout(timer);
    const res=$i('lp-res'); if(!res) return;
    const msg=e.name==='AbortError'?'Tempo esgotado. Verifique a conex\u00e3o.':e.message;
    res.innerHTML='<div class="lp-results"><div class="lp-res-empty" style="color:var(--red);">\u26a0\ufe0f '+sanitize(msg)+'</div></div>';
  }
}

async function doAuth(mode){
  const isSU=mode==='signup';
  const email=($i('ae').value||'').trim();
  const pass=$i('ap').value||'';
  const name=isSU?($i('aname')?.value||'').trim():'';
  const phone=isSU?($i('aphone')?.value||'').trim():'';
  const err=$i('aerr'), btn=$i('abtn');
  err.textContent='';
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='E-mail inv\u00e1lido.';return;}
  if(pass.length<6){err.textContent='Senha m\u00ednima: 6 caracteres.';return;}
  if(isSU&&name.length<2){err.textContent='Digite seu nome.';return;}
  btn.disabled=true; btn.textContent=isSU?'Criando conta\u2026':'Entrando\u2026';
  try{
    if(isSU){
      const {data,error}=await db.auth.signUp({email,password:pass,options:{data:{full_name:name,phone}}});
      if(error) throw error;
      if(!data.session){
        document.getElementById('app').innerHTML='<div class="auth-wrap"><div class="auth-card"><div class="auth-confirm"><h3>\u2709\ufe0f Confirme seu e-mail</h3><p>Link enviado para <strong>'+sanitize(email)+'</strong>.<br>Clique nele para ativar sua conta.</p></div><p style="font-size:12px;color:var(--muted);text-align:center;margin-top:14px;">N\u00e3o recebeu? Verifique o spam ou desative a confirma\u00e7\u00e3o em <strong>Supabase \u2192 Auth \u2192 Settings</strong>.</p></div><div style="text-align:center;margin-top:14px;"><button class="auth-back" onclick="showAuth(\'login\')">J\u00e1 confirmei \u2192 Entrar</button></div></div>';
        return;
      }
      S.session=data.session;
      await loadOwner();
      S.shop?showAdmin():showSetup();
    }else{
      const {data,error}=await db.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
      S.session=data.session;
      await loadOwner();
      S.shop?showAdmin():showSetup();
    }
  }catch(e){
    const msg=e.message.includes('Invalid login')?'E-mail ou senha incorretos.':e.message.includes('already registered')?'E-mail j\u00e1 cadastrado.':e.message.includes('Email not confirmed')?'E-mail n\u00e3o confirmado. Verifique sua caixa.':sanitize(e.message);
    err.textContent=msg;
    btn.disabled=false; btn.textContent=isSU?'Criar conta e configurar barbearia':'Entrar';
  }
}

async function doSetup(){
  const name=($i('sname').value||'').trim(), slug=($i('sslug').value||'').replace(/\s/g,'');
  const err=$i('setup-err'), btn=$i('setup-btn');
  err.textContent='';
  if(name.length<2){err.textContent='Digite o nome da barbearia.';return;}
  if(slug.length<2){err.textContent='Slug muito curto (m\u00ednimo 2 caracteres).';return;}
  if(!/^[a-z0-9-]+$/.test(slug)){err.textContent='Slug: apenas letras min\u00fasculas, n\u00fameros e h\u00edfens.';return;}
  if(!setupSvcs.length){err.textContent='Adicione ao menos um servi\u00e7o.';return;}
  const invalidSvc=setupSvcs.find(s=>!s.name.trim());
  if(invalidSvc){err.textContent='Preencha o nome de todos os servi\u00e7os.';return;}
  const closedDays=[...document.querySelectorAll('.day-btn.closed')].map(b=>parseInt(b.dataset.day));
  btn.disabled=true; btn.textContent='Salvando\u2026';
  try{
    const shopData={
      user_id:S.session.user.id, name, slug,
      barber_name:($i('sbarber').value||'').trim()||null,
      whatsapp:($i('swa').value||'').trim()||null,
      instagram:($i('sinsta').value||'').trim()||null,
      address:($i('saddr').value||'').trim()||null,
      open_time:$i('sopen').value, close_time:$i('sclose').value,
      lunch_start:$i('sls').value, lunch_end:$i('sle').value,
      closed_days:closedDays.join(','), slot_interval:30
    };
    const shops=await dbPost('shops',shopData,tok());
    const shop=shops[0]; if(!shop) throw new Error('Erro ao criar barbearia.');
    const scheds=[];
    for(let d=0;d<7;d++) scheds.push({shop_id:shop.id,day_of_week:d,is_open:!closedDays.includes(d),open_time:$i('sopen').value,close_time:$i('sclose').value,lunch_start:$i('sls').value,lunch_end:$i('sle').value});
    await dbPost('schedules',scheds,tok());
    await dbPost('services',setupSvcs.map((s,i)=>({shop_id:shop.id,name:s.name.trim(),duration:s.duration,price:s.price,active:true,sort_order:i})),tok());
    S.shop=shop;
    const sv=await dbGet('services',{'shop_id':'eq.'+shop.id,'order':'sort_order','select':'*'},tok());
    S.svcs=sv||[];
    toastOk('Barbearia criada! \ud83c\udf89');
    showAdmin();
  }catch(e){
    err.textContent=e.message.includes('duplicate')||e.message.includes('unique')?'Slug j\u00e1 em uso. Escolha outro.':sanitize(e.message);
    btn.disabled=false; btn.textContent='Salvar e abrir painel';
  }
}

function drawBarChart(data,labels){
  const max=Math.max(...data,1), h=110, bw=Math.max(8,Math.floor(560/data.length)-4), tw=data.length*(bw+4)+20;
  const bars=data.map((v,i)=>{
    const bh=Math.round((v/max)*(h-35)), x=10+i*(bw+4), y=h-20-bh;
    const lbl=i%2===0?'<text x="'+(x+bw/2)+'" y="'+(h-4)+'" text-anchor="middle" font-size="9" fill="#6E6354">'+labels[i]+'</text>':'';
    const val=v>0?'<text x="'+(x+bw/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#BD9152">'+v+'</text>':'';
    return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(bh,0)+'" fill="#BD9152" rx="3" opacity="0.85"/>'+lbl+val;
  }).join('');
  return '<div style="overflow-x:auto;"><svg width="100%" viewBox="0 0 '+tw+' '+h+'" style="min-width:280px;"><line x1="10" y1="'+(h-20)+'" x2="'+(tw-10)+'" y2="'+(h-20)+'" stroke="#E2D6BC" stroke-width="1"/>'+bars+'</svg></div>';
}

/* ── Helpers visuais do calendário (apenas apresentação, não alteram dados/regras) ── */
const CAL_MONTHNAMES=['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function calMonthOf(dateStr){ return dateStr.slice(0,7); }
function calMonthLabel(monthStr){ const [y,m]=monthStr.split('-').map(Number); return CAL_MONTHNAMES[m-1]+' '+y; }
function buildCalendarGrid(monthStr, selectedDate){
  const [y,m]=monthStr.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const todayStr=today();
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1; d<=daysInMonth; d++){
    const ds=y+'-'+pad(m)+'-'+pad(d);
    let cls='cal-cell day';
    if(ds===todayStr) cls+=' is-today';
    if(ds===selectedDate) cls+=' selected';
    cells+='<div class="'+cls+'" onclick="calPick(\''+ds+'\')">'+d+'</div>';
  }
  return cells;
}
function renderCalendarOnly(){
  const grid=$i('cal-grid'), label=$i('cal-month-label');
  if(grid) grid.innerHTML=buildCalendarGrid(S.calMonth,S.aDate);
  if(label) label.textContent=calMonthLabel(S.calMonth);
}
function calShift(delta){
  const [y,m]=S.calMonth.split('-').map(Number);
  const d=new Date(y,m-1+delta,1);
  S.calMonth=d.getFullYear()+'-'+pad(d.getMonth()+1);
  renderCalendarOnly();
}

async function loadBlockSlots(date){
  if(!date) return;
  const area=$i('block-slots-area'); if(!area) return;
  const saveBtn=$i('save-block-btn'); if(saveBtn) saveBtn.disabled=true;
  area.innerHTML='<div class="mini-load"><div class="spinner"></div></div>';
  try{
    const dow=new Date(date+'T00:00:00').getDay();
    const sched=S.schedules.find(s=>s.day_of_week===dow)||{is_open:true,open_time:S.shop.open_time||'09:00',close_time:S.shop.close_time||'19:00',lunch_start:S.shop.lunch_start||'12:00',lunch_end:S.shop.lunch_end||'13:30'};
    if(!sched.is_open){
      area.innerHTML='<div class="empty" style="margin:10px 0;">Dia j\u00e1 fechado na agenda semanal.</div>';
      return;
    }
    const [appts,existingBlocks]=await Promise.all([
      dbGet('appointments',{'shop_id':'eq.'+S.shop.id,'date':'eq.'+date,'status':'neq.cancelled','select':'time,duration'},tok()),
      dbGet('blocked_slots',{'shop_id':'eq.'+S.shop.id,'date':'eq.'+date,'select':'id,time'},tok()),
    ]);
    const bookedSet=new Set((appts||[]).map(a=>a.time));
    const blockedSet=new Set((existingBlocks||[]).filter(b=>b.time).map(b=>b.time));
    const fullDayBlock=(existingBlocks||[]).some(b=>b.time===null);
    const openM=toMin(sched.open_time), closeM=toMin(sched.close_time);
    const lsM=toMin(sched.lunch_start), leM=toMin(sched.lunch_end);
    const interval=S.shop.slot_interval||30;
    const slots=[];
    for(let t=openM;t+interval<=closeM;t+=interval){
      if(t<leM&&t+interval>lsM) continue;
      slots.push(fromMin(t));
    }
    if(!slots.length){
      area.innerHTML='<div class="empty" style="margin:10px 0;">Nenhum hor\u00e1rio neste dia.</div>';
      return;
    }
    // selectedToBlock = set of slots barber wants to block in this session
    window._blockDate=date;
    window._blockSelected=new Set(blockedSet);
    window._fullDayBlock=fullDayBlock;
    const html=
      '<label class="day-block-toggle" onclick="toggleFullDayBlock()">'
        +'<input type="checkbox" id="full-day-chk" '+(fullDayBlock?'checked':'')+' onclick="event.stopPropagation()">'
        +'<span>Bloquear o dia todo</span>'
      +'</label>'
      +'<div class="slot-picker-grid" id="slot-grid" style="'+(fullDayBlock?'opacity:.4;pointer-events:none;':'')+'">'+slots.map(t=>{
        const isBooked=bookedSet.has(t);
        const isBlocked=blockedSet.has(t)||fullDayBlock;
        const cls=isBooked?'slot-pick-btn already-booked':isBlocked?'slot-pick-btn to-block':'slot-pick-btn available';
        const onclick=isBooked?'':' onclick="toggleBlockSlot(this,\''+t+'\')"';
        const title=isBooked?'J\u00e1 agendado por cliente':'';
        return '<button class="'+cls+'" type="button"'+onclick+' title="'+title+'">'+t+'</button>';
      }).join('')+'</div>'
      +'<p style="font-size:12px;color:var(--muted);margin-top:6px;">&#128308; Bloqueado &nbsp; &#9898; Dispon\u00edvel &nbsp; &#9940; J\u00e1 agendado</p>';
    area.innerHTML=html;
    if(saveBtn) saveBtn.disabled=false;
  }catch(e){
    area.innerHTML='<div class="empty">⚠️ Erro: '+sanitize(e.message)+'</div>';
  }
}

function toggleFullDayBlock(){
  window._fullDayBlock=!window._fullDayBlock;
  const chk=$i('full-day-chk'); if(chk) chk.checked=window._fullDayBlock;
  const grid=$i('slot-grid'); if(grid) grid.style.cssText=window._fullDayBlock?'opacity:.4;pointer-events:none;':'';
}

function toggleBlockSlot(btn, time){
  if(window._blockSelected.has(time)){
    window._blockSelected.delete(time);
    btn.className='slot-pick-btn available';
  }else{
    window._blockSelected.add(time);
    btn.className='slot-pick-btn to-block';
  }
}

async function saveBlock(){
  const date=window._blockDate;
  const err=$i('bmerr'); if(err) err.textContent='';
  if(!date){if(err) err.textContent='Selecione uma data.'; return;}
  const btn=$i('save-block-btn'); if(btn){btn.disabled=true;btn.textContent='Salvando…';}
  try{
    // Remove todos bloqueios existentes deste dia
    await dbDel('blocked_slots',{'shop_id':'eq.'+S.shop.id,'date':'eq.'+date},tok());
    // Inserir novos bloqueios
    const toInsert=[];
    if(window._fullDayBlock){
      toInsert.push({shop_id:S.shop.id,date,time:null,reason:'Dia bloqueado'});
    }else{
      window._blockSelected.forEach(time=>{
        toInsert.push({shop_id:S.shop.id,date,time,reason:null});
      });
    }
    if(toInsert.length) await dbPost('blocked_slots',toInsert,tok());
    // Recarrega lista
    const rows=await dbGet('blocked_slots',{'shop_id':'eq.'+S.shop.id,'date':'gte.'+today(),'order':'date,time','select':'*'},tok());
    S.blocked=rows||[];
    closeModal(); renderBlockedList();
    toastOk(toInsert.length?'Bloqueios salvos!':'Bloqueios removidos.');
  }catch(e){
    if(err) err.textContent='Erro: '+sanitize(e.message);
    if(btn){btn.disabled=false;btn.textContent='Salvar bloqueios';}
  }
}
async function deleteBlock(id){
  try{
    await dbDel('blocked_slots',{'id':'eq.'+id},tok());
    S.blocked=S.blocked.filter(b=>b.id!==id); renderBlockedList(); toastOk('Bloqueio removido.');
  }catch(e){ toastErr('Erro: '+e.message); }
}

function b2(c){

  const dayNames=['Domingo','Segunda-feira','Ter\u00e7a-feira','Quarta-feira','Quinta-feira','Sexta-feira','S\u00e1bado'];

  };
}
async function b3(c){
  const sv=S.sel.svc, sh=S.bShop;
  c.innerHTML='<button class="bback" onclick="bGoTo(2)" type="button">\u2190 Trocar data</button><h2 class="btitle">Escolha o hor\u00e1rio</h2><p class="bhint">'+fDate(S.sel.date)+' \u00b7 '+sanitize(sv.name)+' ('+sv.duration+' min)</p><div id="bsl"><div class="mini-load"><div class="spinner"></div></div></div>';
  try{
    const dow=new Date(S.sel.date+'T00:00:00').getDay();
    const sched=S.bScheds.find(s=>s.day_of_week===dow);
    const openM=toMin(sched?sched.open_time:sh.open_time||'09:00');
    const closeM=toMin(sched?sched.close_time:sh.close_time||'19:00');
    const lsM=toMin(sched?sched.lunch_start:sh.lunch_start||'12:00');
    const leM=toMin(sched?sched.lunch_end:sh.lunch_end||'13:30');
    const interval=sh.slot_interval||30;
    const isToday=S.sel.date===today();
    const nowM=new Date().getHours()*60+new Date().getMinutes()+15;
    const [appts,blocks]=await Promise.all([
      dbGet('appointments',{'shop_id':'eq.'+sh.id,'date':'eq.'+S.sel.date,'status':'neq.cancelled','select':'time,duration'}),
      dbGet('blocked_slots',{'shop_id':'eq.'+sh.id,'date':'eq.'+S.sel.date,'select':'time'}),
    ]);
    const wrap=$i('bsl'); if(!wrap) return;
    const fullBlock=(blocks||[]).some(b=>b.time===null);
    if(fullBlock){wrap.innerHTML='<div class="empty">Sem atendimento nesse dia.<br><button class="btn btn-g" style="margin-top:12px;" onclick="bGoTo(2)" type="button">Escolher outra data</button></div>';return;}
    const blockedSet=new Set((blocks||[]).map(b=>b.time).filter(Boolean));
    const slots=[];
    for(let t=openM;t+sv.duration<=closeM;t+=interval){
      if(t<leM&&t+sv.duration>lsM) continue;
      if(isToday&&t<=nowM) continue;
      if(blockedSet.has(fromMin(t))) continue;
      const busy=(appts||[]).some(a=>{const as=toMin(a.time),ae=as+a.duration;return t<ae&&(t+sv.duration)>as;});
      if(!busy) slots.push(fromMin(t));
    }
    if(!slots.length){wrap.innerHTML='<div class="empty">Nenhum hor\u00e1rio dispon\u00edvel nesse dia.<br><button class="btn btn-g" style="margin-top:12px;" onclick="bGoTo(2)" type="button">Escolher outra data</button></div>';return;}
    const grid=document.createElement('div'); grid.className='slots-grid';
    slots.forEach(t=>{
      const btn=document.createElement('button'); btn.className='slot-btn'; btn.textContent=t; btn.type='button';
      btn.onclick=()=>{S.sel.time=t;bGoTo(4);}; grid.appendChild(btn);
    });
    wrap.innerHTML=''; wrap.appendChild(grid);
  }catch(e){
    const wrap=$i('bsl'); if(wrap) wrap.innerHTML='<div class="empty">\u26a0\ufe0f Erro ao carregar hor\u00e1rios: '+sanitize(e.message)+'<br><button class="btn btn-g" style="margin-top:12px;" onclick="bGoTo(2)" type="button">Voltar</button></div>';
  }
}

    +'<div class="sum-row"><span>Hor\u00e1rio</span><span>'+S.sel.time+'</span></div>'

async function bConfirm(){
  const btn=$i('b5btn'), err=$i('b5err');
  btn.disabled=true; btn.textContent='Confirmando\u2026'; err.textContent='';
  try{
    const sh=S.bShop, sv=S.sel.svc;
    const [existing,blocks]=await Promise.all([
      dbGet('appointments',{'shop_id':'eq.'+sh.id,'date':'eq.'+S.sel.date,'status':'neq.cancelled','select':'time,duration'}),
      dbGet('blocked_slots',{'shop_id':'eq.'+sh.id,'date':'eq.'+S.sel.date,'select':'time'}),
    ]);
    const fullBlock=(blocks||[]).some(b=>b.time===null);
    const blockedSet=new Set((blocks||[]).map(b=>b.time).filter(Boolean));
    if(fullBlock||blockedSet.has(S.sel.time)){ err.textContent='Hor\u00e1rio bloqueado. Escolha outro.'; btn.disabled=false; btn.textContent='Confirmar agendamento'; setTimeout(()=>bGoTo(3),1500); return; }
    const conflict=(existing||[]).some(a=>{const as=toMin(a.time),ae=as+a.duration,ts=toMin(S.sel.time),te=ts+sv.duration;return ts<ae&&te>as;});
    if(conflict){ err.textContent='Hor\u00e1rio ocupado. Escolha outro.'; btn.disabled=false; btn.textContent='Confirmar agendamento'; setTimeout(()=>bGoTo(3),1500); return; }
    const [,mm,dd]=S.sel.date.split('-');
    const prefix=sh.slug.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3);
    const ticketNumber=prefix+'-'+dd+mm+'-'+pad((existing||[]).length+1);
    const rows=await dbPost('appointments',{
      shop_id:sh.id, ticket_number:ticketNumber,
      service_id:sv.id, service_name:sv.name, duration:sv.duration, price:sv.price,
      date:S.sel.date, time:S.sel.time, name:S.sel.name, phone:S.sel.phone
    });
    S.lastApptId=rows&&rows[0]?rows[0].id:null;
    bTicket(ticketNumber);
  }catch(e){
    err.textContent='Erro ao confirmar: '+sanitize(e.message);
    btn.disabled=false; btn.textContent='Confirmar agendamento';
  }
}

async function bMyApptsSearch(){
  var raw=($i('ma-phone').value||'').trim();
  var err=$i('ma-err'); err.textContent='';
  var digits=raw.replace(/\D/g,'');
  if(digits.length<8){err.textContent='Digite um telefone v\u00e1lido.';return;}
  var btn=$i('ma-btn'); if(btn){btn.disabled=true;btn.textContent='Buscando\u2026';}
  try{
    var suffix=digits.slice(-8);
    var all=await dbGet('appointments',{
      'shop_id':'eq.'+S.bShop.id,
      'date':'gte.'+today(),
      'status':'neq.cancelled',
      'order':'date,time',
      'select':'id,ticket_number,service_name,price,date,time,name,phone'
    });

      return (a.phone||'').replace(/\D/g,'').endsWith(suffix);
    });

    :shopSlugs.length===1
      ?'<a href="'+location.pathname+'?shop='+shopSlugs[0]+'" class="btn btn-p btn-block" style="margin-bottom:20px;font-size:15px;text-decoration:none;">+ Agendar novo hor\u00e1rio</a>'
      :'<div style="margin-bottom:20px;">'
        +shopSlugs.map(function(slug){
          return '<a href="'+location.pathname+'?shop='+slug+'" class="btn btn-p btn-block" style="margin-bottom:8px;font-size:14px;text-decoration:none;">+ Agendar em '+sanitize(shopsSeen[slug])+'</a>';
        }).join('')
        +'</div>';
  wrap.innerHTML='<div style="background:var(--paper);min-height:100vh;padding:20px 18px 40px;">'
    +'<button onclick="lpMyAppts()" type="button" style="background:none;border:none;color:var(--muted);font-size:13.5px;cursor:pointer;margin-bottom:16px;">&larr; Buscar outro telefone</button>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'
    +'<h2 style="font-family:Anton,sans-serif;font-size:20px;font-weight:400;color:var(--ink);">Meus Agendamentos</h2>'
    +'<span style="font-size:13px;color:var(--muted);">'+appts.length+' encontrado'+(appts.length>1?'s':'')+'</span>'
    +'</div>'
    +agendarBtn
    +list
    +'<button class="btn btn-g btn-block" style="margin-top:16px;" onclick="showLanding()" type="button">&larr; Voltar ao in\u00edcio</button>'
    +'</div>';
}

function lpCancelAppt(id, ticket, date, time, cancelHours){
  const h=cancelHours!=null?cancelHours:2;
  if(!canCancel(date,time,h)){
    showModal('<h3>N\u00e3o \u00e9 poss\u00edvel cancelar</h3><p class="modal-sub">Cancelamento permitido somente com <strong>'+h+'h</strong> de anteced\u00eancia. Este hor\u00e1rio est\u00e1 pr\u00f3ximo demais.</p><div class="modal-footer"><button class="btn btn-p" onclick="closeModal()" type="button">Entendido</button></div>');
    return;
  }
  showModal('<h3>Cancelar agendamento?</h3><p class="modal-sub">Senha: <strong>'+sanitize(ticket)+'</strong><br>O hor\u00e1rio ser\u00e1 liberado.</p><div class="modal-footer"><button class="btn btn-g" onclick="closeModal()" type="button">Voltar</button><button class="btn btn-r" onclick="lpConfirmCancel(\''+id+'\')" type="button">Confirmar cancelamento</button></div>');
}

async function lpConfirmCancel(id){
  closeModal();
  try{
    await _db('PATCH','appointments',{'id':'eq.'+id},{status:'cancelled',cancelled_at:new Date().toISOString()},null);
    document.getElementById('app').innerHTML='<div style="background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;"><div style="text-align:center;padding:40px 20px;"><div style="font-size:56px;margin-bottom:16px;">&#10003;</div><h2 style="font-family:Anton,sans-serif;font-size:24px;color:var(--green);font-weight:400;margin-bottom:10px;">Cancelado com sucesso</h2><p style="color:var(--muted);font-size:14.5px;margin-bottom:24px;">Seu hor\u00e1rio foi liberado.</p><button class="btn btn-g btn-block" style="margin-bottom:10px;" onclick="lpMyAppts()" type="button">Ver outros agendamentos</button><button class="btn btn-p btn-block" onclick="showLanding()" type="button">Voltar ao in\u00edcio</button></div></div>';
  }catch(e){ toastErr('Erro ao cancelar: '+e.message); }
}

init();
</script>
</body>
</html>
